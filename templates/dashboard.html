<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Gestão de Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Controle de Acesso - Admin</span>
            <div class="d-flex">
                <a href="/monitoramento" class="btn btn-outline-info me-2">Monitoramento</a>
                <a href="/logout" class="btn btn-outline-danger">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h5>Cadastrar Colaborador</h5>
                    <form id="formColaborador">
                        <div class="mb-2">
                            <label class="form-label small">Nome Completo</label>
                            <input type="text" id="nome" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Tag RFID</label>
                            <input type="text" id="tag" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Função</label>
                            <input type="text" id="funcao" class="form-control" required>
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" id="permissao" class="form-check-input">
                            <label class="form-check-label">Autorizado para Sala NDA</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Salvar Colaborador</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm p-3">
                    <h5>Colaboradores Cadastrados</h5>
                    <table class="table table-hover mt-3">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>Tag</th>
                                <th>Acesso</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para carregar a lista
        async function carregarColaboradores() {
            const resp = await fetch('/colaboradores');
            const dados = await resp.json();
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = '';

            dados.forEach(u => {
                corpo.innerHTML += `
                    <tr>
                        <td>${u.nome} <br><small class="text-muted">${u.funcao}</small></td>
                        <td><code>${u.tag_rfid}</code></td>
                        <td><span class="badge ${u.permissao ? 'bg-success' : 'bg-secondary'}">${u.permissao ? 'Sim' : 'Não'}</span></td>
                        <td><span class="badge ${u.na_sala ? 'bg-primary' : 'bg-light text-dark'}">${u.na_sala ? 'Na Sala' : 'Fora'}</span></td>
                        <td>
                            <button onclick="excluir(${u.id})" class="btn btn-sm btn-danger">Excluir</button>
                        </td>
                    </tr>`;
            });
        }

        // Salvar novo colaborador
        document.getElementById('formColaborador').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('nome').value,
                tag_rfid: document.getElementById('tag').value,
                funcao: document.getElementById('funcao').value,
                permissao: document.getElementById('permissao').checked ? 1 : 0
            };

            await fetch('/colaboradores', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            document.getElementById('formColaborador').reset();
            carregarColaboradores();
        });

        // Excluir colaborador
        async function excluir(id) {
            if(confirm('Deseja realmente excluir este colaborador?')) {
                await fetch(`/colaboradores/${id}`, { method: 'DELETE' });
                carregarColaboradores();
            }
        }

        // Início
        carregarColaboradores();
    </script>
</body>
</html>
