<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Segurança</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; width: 100%; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Acesso Restrito</h3>
        <div id="alerta" class="alert alert-danger d-none"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" id="usuario" class="form-control" required placeholder="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" required placeholder="1234">
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const alerta = document.getElementById('alerta');

            const resp = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario, senha })
            });

            if (resp.ok) {
                window.location.href = '/admin';
            } else {
                alerta.innerText = "Usuário ou senha incorretos!";
                alerta.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
