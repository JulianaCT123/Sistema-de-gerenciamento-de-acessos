<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css"> </head>
<body class="login-body">
    <div class="login-container">
        <h2 id="h2-login">Acesso Restrito</h2>
        <p>Identifique-se para gerenciar a sala de segurança.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required placeholder="Digite seu usuário">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit" id="btn-entrar">Entrar no Sistema</button>
        </form>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
