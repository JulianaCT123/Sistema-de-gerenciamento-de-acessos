<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de Acesso - Auditoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .evento-invasao { color: #dc3545; font-weight: bold; }
        .evento-negado { color: #fd7e14; }
        .evento-autorizado { color: #198754; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema NDA - Auditoria</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/admin">Dashboard</a>
                <a class="nav-link" href="/monitoramento">Monitoramento</a>
                <a class="nav-link active" href="/logs_view">Histórico de Logs</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Histórico de Atividades</h2>
            <a href="/exportar_csv" class="btn btn-success">
                <i class="bi bi-file-earmark-spreadsheet"></i> Exportar para Pandas (CSV)
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-secondary">
                            <tr>
                                <th>Data/Hora</th>
                                <th>Colaborador</th>
                                <th>Tag RFID</th>
                                <th>Tipo de Evento</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaLogs">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
        <p class="text-muted mt-3 small">* Exibindo os últimos 50 registros de acesso.</p>
    </div>

    <script>
        async function carregarLogs() {
            try {
                const response = await fetch('/logs');
                const logs = await response.json();
                const corpoTabela = document.getElementById('tabelaLogs');
                
                corpoTabela.innerHTML = '';

                logs.forEach(log => {
                    let classeEvento = '';
                    
                    // Lógica de cores para facilitar a auditoria visual
                    if (log.evento.includes('INVASÃO')) classeEvento = 'evento-invasao';
                    else if (log.evento.includes('Negado')) classeEvento = 'evento-negado';
                    else classeEvento = 'evento-autorizado';

                    corpoTabela.innerHTML += `
                        <tr>
                            <td>${new Date(log.data).toLocaleString('pt-BR')}</td>
                            <td>${log.nome}</td>
                            <td><code>${log.tag}</code></td>
                            <td class="${classeEvento}">${log.evento}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar logs:", error);
            }
        }

        // Carrega os logs ao abrir a página
        carregarLogs();
    </script>
</body>
</html>
